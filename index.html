<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./favicon.png">
  <meta name="description" content="Sistema de registro de AMPOs y gestión de digitadores. Administra los procesos pendientes y finalizados de forma eficiente.">
  <title>DIGITADORES GOB</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <main class="container">
    <header>
      <h1>DIGITADORES GOB</h1>
    </header>

    <form id="registroForm">
      <section class="form-grid">
        <div class="input-group">
          <label for="ampo">AMPO</label>
          <input id="ampo" name="ampo" type="text" placeholder="Ej. A-123" required>
        </div>
        <div class="input-group">
          <label for="digitador">Digitador</label>
          <input id="digitador" name="digitador" type="text" placeholder="Nombre completo" required>
        </div>
        <div class="input-group">
          <label for="fecha">Fecha</label>
          <input id="fecha" name="fecha" type="date" required>
        </div>
        <div class="input-group">
          <label for="pendiente">Pendiente (Cantidad)</label>
          <input id="pendiente" name="pendiente" type="number" min="0" placeholder="Ej. 5" required>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="primary" id="btnAgregar">
          <span class="spinner"></span>
          <span class="btn-text">Agregar Registro</span>
        </button>
        <button type="button" id="btnLimpiar" class="secondary">Limpiar form</button>
        <button type="button" id="btnDescargar" class="success">📥 Exportar Excel (CSV)</button>
        <button type="button" id="btnEliminarTodo" class="danger">Eliminar Todo</button>
      </div>
    </form>

    <section class="stats" aria-live="polite">
      <div class="stats-item">
        <span>Total Pendientes:</span>
        <span id="totalPendiente" class="stats-value">0</span>
      </div>
      <div class="stats-item">
        <span>Total Finalizados:</span>
        <span id="totalFinalizados" class="stats-value">0</span>
      </div>
    </section>

    <section>
      <h2>Pendientes</h2>
      <div class="table-container table-responsive-mobile">
        <table id="tablaPendientes">
          <thead>
            <tr>
              <th>AMPO</th>
              <th>Digitador</th>
              <th>Fecha</th>
              <th>Pendiente</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyPendientes">
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Finalizados</h2>
      <div class="table-container table-responsive-mobile">
        <table id="tablaFinalizados">
          <thead>
            <tr>
              <th>AMPO</th>
              <th>Digitador</th>
              <th>Fecha</th>
              <th>Cantidad</th>
            </tr>
          </thead>
          <tbody id="tbodyFinalizados">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Contenedor para Notificaciones (Toasts) -->
  <div id="toast-container"></div>

  <!-- Modal para confirmaciones -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-content">
      <h3 class="modal-title">Confirmar Acción</h3>
      <p class="modal-body" id="confirmModalBody">¿Estás seguro?</p>
      <div class="modal-actions">
        <button class="secondary" id="btnCancelModal">Cancelar</button>
        <button class="danger" id="btnConfirmModal">Eliminar Todo</button>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>

</html>
